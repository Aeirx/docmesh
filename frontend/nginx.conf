# Not in the original file list, but required to implement the specified Docker
# behavior: SPA history fallback + /api proxy to the backend container.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: unknown paths serve the app shell
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API in production, mirroring the Vite dev proxy
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 26m;  # slightly above the app's 25 MB cap; the app enforces the real limit
    }
}
